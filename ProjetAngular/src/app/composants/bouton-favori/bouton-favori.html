<button 
  class="bouton-favori-container" 
  (click)="basculer($event, coeur)"
  [class.actif]="estActif()"
  title="Ajouter aux favoris">
  
  <div class="effet-lueur" *ngIf="estActif()"></div>
  
  <svg 
    #coeur 
    class="icone-coeur" 
    xmlns="http://www.w3.org/2000/svg" 
    viewBox="0 0 24 24" 
    [attr.fill]="estActif() ? 'currentColor' : 'none'" 
    [attr.stroke]="estActif() ? 'none' : 'currentColor'" 
    stroke-width="2" 
    stroke-linecap="round" 
    stroke-linejoin="round">
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
  </svg>
</button>
